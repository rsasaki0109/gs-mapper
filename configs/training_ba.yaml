# Outdoor gsplat + depth + appearance + joint pose refinement (bundle adjustment).
#
# Extends training_appearance.yaml by turning on joint_pose_refinement: each
# training view learns a 6-DOF delta (so3 rotation + translation) that is
# composed with the COLMAP-given viewmat before rendering. Kicks in after the
# gaussians have had a warmup so the deltas don't absorb shape error.

num_iterations: 30000
batch_size: 1
seed: 42

learning_rate:
  position: 0.00016
  feature: 0.0025
  opacity: 0.05
  scaling: 0.005
  rotation: 0.001

lr_schedule:
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000

sh_degree: 3

densify_from_iter: 500
densify_until_iter: 15000
densify_interval: 100
densify_grad_threshold: 0.0002

opacity_reset_interval: 3000
min_opacity: 0.005

percent_dense: 0.01
max_screen_size: 40

lambda_dssim: 0.2

depth_loss_weight: 0.1

appearance_embedding: true
appearance_lr: 0.001
appearance_reg_weight: 0.01

joint_pose_refinement: true
joint_pose_lr: 0.0001
joint_pose_reg_weight: 0.1
joint_pose_start_iter: 1500

save_iterations: [10000, 20000, 30000]
test_iterations: [10000, 20000, 30000]

resolution: -1
white_background: false
